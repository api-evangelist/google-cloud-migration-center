naftiko: 1.0.0-alpha2
info:
  label: Google Cloud Migration Center Google Migration Center API — Groups
  description: 'Google Cloud Migration Center Google Migration Center API — Groups. 2 operations. Lead operation: Google Cloud
    Migration Center List groups. Self-contained Naftiko capability covering one Google Cloud Migration Center business surface.'
  tags:
  - Google Cloud Migration Center
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_CLOUD_MIGRATION_CENTER_API_KEY: GOOGLE_CLOUD_MIGRATION_CENTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: migration-center-groups
    baseUri: https://migrationcenter.googleapis.com/v1
    description: Google Cloud Migration Center Google Migration Center API — Groups business capability. Self-contained, no
      shared references.
    resources:
    - name: projects-projectId-locations-location-groups
      path: /projects/{projectId}/locations/{location}/groups
      operations:
      - name: listgroups
        method: GET
        description: Google Cloud Migration Center List groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
      - name: creategroup
        method: POST
        description: Google Cloud Migration Center Create a group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: groupId
          in: query
          type: string
          description: The ID to use for the group
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GOOGLE_CLOUD_MIGRATION_CENTER_API_KEY}}'
  exposes:
  - type: rest
    namespace: migration-center-groups-rest
    port: 8080
    description: REST adapter for Google Cloud Migration Center Google Migration Center API — Groups. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/locations/{location}/groups
      name: projects-projectid-locations-location-groups
      description: REST surface for projects-projectId-locations-location-groups.
      operations:
      - method: GET
        name: listgroups
        description: Google Cloud Migration Center List groups
        call: migration-center-groups.listgroups
        with:
          projectId: rest.projectId
          location: rest.location
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Google Cloud Migration Center Create a group
        call: migration-center-groups.creategroup
        with:
          projectId: rest.projectId
          location: rest.location
          groupId: rest.groupId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: migration-center-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Cloud Migration Center Google Migration Center API — Groups. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: google-cloud-migration-center-list
      description: Google Cloud Migration Center List groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: migration-center-groups.listgroups
      with:
        projectId: tools.projectId
        location: tools.location
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: google-cloud-migration-center-create
      description: Google Cloud Migration Center Create a group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: migration-center-groups.creategroup
      with:
        projectId: tools.projectId
        location: tools.location
        groupId: tools.groupId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
