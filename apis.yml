apis:
  - name: Migration Center API
    description: >-
      The Migration Center API provides programmatic access to Google Cloud
      Migration Center for discovering, assessing, and planning migrations of
      on-premises infrastructure to Google Cloud. Developers can use the API to
      manage assets, groups, import jobs, discovery clients, preference sets, and
      export jobs. The API enables automated infrastructure assessment, cost
      estimation, and migration planning workflows.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
